events {}

http {
    upstream backend_servers {
        server v-serve-backend.onrender.com:443;
        server v-serve-hosting-2.onrender.com:443;
        server volunteer-management-system-backend.onrender.com:443;
    }

    server {
        listen 80;

        location / {
            proxy_pass https://backend_servers;

            # REQUIRED for Cloudflare / Render
            proxy_ssl_server_name on;
            proxy_ssl_name v-serve-backend.onrender.com;

            proxy_set_header Host v-serve-backend.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}